version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: energy_audit_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-energy_audit}
      POSTGRES_USER: ${POSTGRES_USER:-asattorov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neda2020luba}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - energy_audit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asattorov} -d ${POSTGRES_DB:-energy_audit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: energy_audit_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-asattorov}:${POSTGRES_PASSWORD:-neda2020luba}@postgres:5432/${POSTGRES_DB:-energy_audit}
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-neda2331}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./logs:/app/logs
    networks:
      - energy_audit_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  energy_audit_network:
    driver: bridge
